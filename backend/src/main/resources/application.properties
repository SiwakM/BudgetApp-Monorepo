spring.application.name=PASIR_Siwak_Mateusz
spring.config.import=optional:file:.env[.properties]

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE:Siwak_Mateusz_grupa_spring}
spring.datasource.username=${MYSQL_USER:user-ms}
spring.datasource.password=${MYSQL_PASSWORD:123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# GraphQL
spring.graphql.http.path=/graphql
spring.graphql.schema.file-extensions=.graphql,.graphqls,.gqls

app.jwt.secret=${JWT_SECRET}